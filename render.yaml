services:
  - type: web
    name: kaskade-backend
    env: node
    buildCommand: pnpm run render:build
    startCommand: pnpm run render:start
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: PNPM_VERSION
        value: 10.32.1
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: MAIL_FROM_EMAIL
        sync: false
      - key: MAIL_FROM_NAME
        sync: false
      # Configuration Mbiyo obligatoire avant tout deploiement:
      # renseigner l'URL API, la cle marchande et le secret webhook.
      - key: MBIYO_API_URL
        sync: false
      - key: MBIYO_SECRET_KEY
        sync: false
      - key: MBIYO_WEBHOOK_SECRET
        sync: false
      - key: MBIYO_WEBHOOK_URL
        sync: false
